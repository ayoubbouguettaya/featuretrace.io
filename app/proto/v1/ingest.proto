syntax = "proto3";

package featuretrace.ingest.v1;

option go_package = "featuretrace.io/app/proto/v1;ingestv1";

// IngestService receives log record batches from FeatureTrace agents.
service IngestService {
  // SendLogs accepts a batch of log records and acknowledges receipt.
  rpc SendLogs(SendLogsRequest) returns (SendLogsResponse);
}

// LogRecord represents a single log entry sent by the agent.
message LogRecord {
  // Unix timestamp in nanoseconds.
  int64  timestamp_ns = 1;
  string message      = 2;
  string level        = 3;

  // Feature-aware observability fields.
  string service  = 4;
  string feature  = 5;
  string trace_id = 6;
  string span_id  = 7;

  // Source tracking.
  string source    = 8;
  string container = 9;

  // Arbitrary key-value metadata attached by enrichment.
  map<string, string> metadata = 10;
}

message SendLogsRequest {
  repeated LogRecord records = 1;
}

message SendLogsResponse {
  // Number of records accepted by the backend.
  int32 accepted = 1;
}

